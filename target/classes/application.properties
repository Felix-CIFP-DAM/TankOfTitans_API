spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


#  MEDIDAS DE PROTECCION CONTRA TIEMPO DE INACTIVIDAD, MULTIPLES PETICIONES Y CONEXIONES ZOMBIES
#-------------------------------------------------------------------------
# 1. El tiempo máximo de vida de una conexión. (Ponlo en 2 minutos = 120000 ms)
# Esto obliga a Hikari a renovar la conexión antes de que Azure la mate a los 4 mins.
spring.datasource.hikari.max-lifetime=120000

# 2. Comprueba que la conexión está viva si lleva inactiva más de 30 segundos
spring.datasource.hikari.keepalive-time=30000

# 3. (Opcional pero recomendado) Tiempo máximo de espera si la BD está ocupada
spring.datasource.hikari.connection-timeout=15000

# 4. Si vas a recibir muchas peticiones simultáneas, amplía el pool
# (Por defecto son 10, puedes subirlo a 20 o 30)
spring.datasource.hikari.maximum-pool-size=20
